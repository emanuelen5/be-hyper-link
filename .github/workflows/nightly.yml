name: Nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Check for unreleased changes
        id: check_unreleased
        run: |
          NOTES=$(.github/scripts/extract-release-notes.sh)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox
        run: npm run build:firefox

      - name: Build Chrome
        run: npm run build:chrome

      - name: Create or update nightly GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: ${{ steps.check_unreleased.outputs.notes }}
          files: |
            hyper-link-firefox.zip
            hyper-link-chrome.zip
